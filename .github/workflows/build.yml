name: Build & Release

# ── Triggers ───────────────────────────────────────────────────────────────────
# 1. Push a version tag  →  builds all platforms + creates a GitHub Release draft
# 2. Manual trigger       →  builds all platforms + uploads as workflow artifacts
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # ── Read release notes from file committed by release.mjs ──────────
      - name: Read release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        shell: bash
        run: |
          if [ -f .release-notes.md ]; then
            echo "Found .release-notes.md"
            # Use GitHub Actions delimiter for multiline output
            {
              echo "body<<RELEASE_NOTES_EOF"
              cat .release-notes.md
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No .release-notes.md found, using fallback"
            {
              echo "body<<RELEASE_NOTES_EOF"
              echo "## Downloads"
              echo ""
              echo "| Platform | File |"
              echo "|----------|------|"
              echo "| macOS (Apple Silicon) | \`.dmg\` |"
              echo "| macOS (Intel) | \`.dmg\` |"
              echo "| Windows (installer) | \`.msi\` or \`-setup.exe\` |"
              echo "| Windows (portable) | \`-portable.exe\` — no install needed |"
              echo "| Linux | \`.deb\` or \`.AppImage\` |"
              echo ""
              echo "> **🍎 macOS:** On first launch, right-click the app → **Open** → click **Open** to bypass the Gatekeeper prompt."
              echo ""
              echo "### What's New"
              echo "See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for changes."
              echo ""
              echo "---"
              echo ""
              echo "Full changelog: [CHANGES.md](https://github.com/${{ github.repository }}/blob/main/CHANGES.md)"
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── macOS code signing setup ──────────────────────────────────────────
      # If APPLE_CERTIFICATE secret is configured → full Developer ID signing + notarization
      # If not → ad-hoc signing ("-") which avoids the "app is damaged" error
      #          (users see "unidentified developer" instead, bypassable via right-click → Open)
      # NOTE: env vars are set conditionally via GITHUB_ENV so that APPLE_CERTIFICATE
      #       is never set to an empty string (which would make Tauri try to import
      #       an invalid certificate and fail).
      - name: Configure macOS code signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGN_ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          A_ID: ${{ secrets.APPLE_ID }}
          A_PASS: ${{ secrets.APPLE_PASSWORD }}
          A_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CERT" ]; then
            echo "Using Developer ID signing + notarization"
            echo "APPLE_CERTIFICATE=$CERT" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=$CERT_PASS" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=$SIGN_ID" >> "$GITHUB_ENV"
            echo "APPLE_ID=$A_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$A_PASS" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$A_TEAM" >> "$GITHUB_ENV"
          else
            echo "No Apple certificate found — using ad-hoc signing"
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi

      # ── Tag push → build + create/update GitHub Release draft ────────────
      - name: Build & create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Android Application Installer ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # ── Manual trigger → build only (no release) ────────────────────────
      - name: Build only
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}


      # ── Portable EXE for Windows ─────────────────────────────────────────
      - name: Prepare portable EXE
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $src = "src-tauri/target/${{ matrix.target }}/release/android-application-installer.exe"
          $dst = "src-tauri/target/${{ matrix.target }}/release/Android.Application.Installer_${version}_x64-portable.exe"
          Copy-Item $src $dst

      - name: Upload portable EXE to release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $exe = "src-tauri/target/${{ matrix.target }}/release/Android.Application.Installer_${version}_x64-portable.exe"
          gh release upload ${{ github.ref_name }} $exe --clobber

      # ── Always upload artifacts (downloadable from Actions tab) ──────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/*-portable.exe

  # ── Create updater bundles, sign, upload, generate updater.json ────────────
  # tauri-action deletes .sig files and updater bundles (.AppImage.tar.gz,
  # .nsis.zip) from disk after the build.  Only .app.tar.gz survives for macOS.
  # This job downloads the release assets, creates any missing updater bundles,
  # signs everything with the Tauri Ed25519 key, and uploads .sig files.
  update-updater-json:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Wait for release assets to propagate
        run: sleep 15

      # ── Download release assets, create updater bundles, sign, upload ───
      - name: Create updater bundles and sign
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _updater && cd _updater

          echo "=== Current release assets ==="
          gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' | sort
          echo ""

          # ── 1. macOS: .app.tar.gz already uploaded by tauri-action ──────
          echo "=== Downloading macOS updater bundles ==="
          gh release download "${{ github.ref_name }}" --pattern '*_aarch64.app.tar.gz' --skip-existing 2>/dev/null || true
          gh release download "${{ github.ref_name }}" --pattern '*_x64.app.tar.gz' --skip-existing 2>/dev/null || true

          # ── 2. Linux: create .AppImage.tar.gz from .AppImage ────────────
          echo "=== Downloading Linux AppImage ==="
          gh release download "${{ github.ref_name }}" --pattern '*.AppImage' --skip-existing 2>/dev/null || true
          for img in *.AppImage; do
            [ -f "$img" ] || continue
            echo "Creating ${img}.tar.gz"
            tar czf "${img}.tar.gz" "$img"
          done

          # ── 3. Windows: create .nsis.zip from NSIS setup exe ────────────
          echo "=== Downloading Windows NSIS setup ==="
          gh release download "${{ github.ref_name }}" --pattern '*_x64-setup.exe' --skip-existing 2>/dev/null || true
          for exe in *_x64-setup.exe; do
            [ -f "$exe" ] || continue
            NSIS_ZIP="${exe%-setup.exe}-setup.nsis.zip"
            echo "Creating ${NSIS_ZIP}"
            zip -j "$NSIS_ZIP" "$exe"
          done

          echo ""
          echo "=== Files to sign ==="
          ls -la *.tar.gz *.nsis.zip 2>/dev/null || echo "(none)"
          echo ""

          # ── 4. Sign all updater bundles ─────────────────────────────────
          echo "=== Signing updater bundles ==="
          SIGNED=0
          for f in *.app.tar.gz *.AppImage.tar.gz *.nsis.zip; do
            [ -f "$f" ] || continue
            echo "Signing: $f"
            npx tauri signer sign "$f" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" 2>&1 || {
              echo "  ⚠ Failed to sign $f"
              continue
            }
            if [ -f "$f.sig" ]; then
              echo "  ✓ Signed: $f.sig"
              SIGNED=$((SIGNED + 1))
            fi
          done

          echo ""
          echo "Signed $SIGNED bundle(s)."

          if [ "$SIGNED" -eq 0 ]; then
            echo "::error::No updater bundles were signed — cannot proceed"
            exit 1
          fi

          # ── 5. Upload updater bundles + signatures to release ───────────
          echo ""
          echo "=== Uploading updater artifacts to release ==="
          for f in *.AppImage.tar.gz *.nsis.zip *.sig; do
            [ -f "$f" ] || continue
            echo "  Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

          echo ""
          echo "=== Final release assets ==="
          gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' | sort

      - name: Generate updater.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-updater-json.mjs ${{ github.ref_name }}

      - name: Commit and push updater.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updater.json
          git diff --cached --quiet && echo "No changes to updater.json" && exit 0
          git commit -m "chore: update updater.json for ${{ github.ref_name }}"
          git push


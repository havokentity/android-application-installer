name: Build & Release

# ── Triggers ───────────────────────────────────────────────────────────────────
# 1. Push a version tag  →  builds all platforms + creates a GitHub Release draft
# 2. Manual trigger       →  builds all platforms + uploads as workflow artifacts
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # ── Read release notes from file committed by release.mjs ──────────
      - name: Read release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release_notes
        shell: bash
        run: |
          if [ -f .release-notes.md ]; then
            echo "Found .release-notes.md"
            # Use GitHub Actions delimiter for multiline output
            {
              echo "body<<RELEASE_NOTES_EOF"
              cat .release-notes.md
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No .release-notes.md found, using fallback"
            {
              echo "body<<RELEASE_NOTES_EOF"
              echo "## Downloads"
              echo ""
              echo "| Platform | File |"
              echo "|----------|------|"
              echo "| macOS (Apple Silicon) | \`.dmg\` |"
              echo "| macOS (Intel) | \`.dmg\` |"
              echo "| Windows (installer) | \`.msi\` or \`-setup.exe\` |"
              echo "| Windows (portable) | \`-portable.exe\` — no install needed |"
              echo "| Linux | \`.deb\` or \`.AppImage\` |"
              echo ""
              echo "### What's New"
              echo "See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for changes."
              echo ""
              echo "---"
              echo ""
              echo "Full changelog: [CHANGES.md](https://github.com/${{ github.repository }}/blob/main/CHANGES.md)"
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── Tag push → build + create/update GitHub Release draft ────────────
      - name: Build & create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Android Application Installer ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # ── Manual trigger → build only (no release) ────────────────────────
      - name: Build only
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # ── Portable EXE for Windows ─────────────────────────────────────────
      - name: Prepare portable EXE
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $src = "src-tauri/target/${{ matrix.target }}/release/android-application-installer.exe"
          $dst = "src-tauri/target/${{ matrix.target }}/release/Android.Application.Installer_${version}_x64-portable.exe"
          Copy-Item $src $dst

      - name: Upload portable EXE to release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $exe = "src-tauri/target/${{ matrix.target }}/release/Android.Application.Installer_${version}_x64-portable.exe"
          gh release upload ${{ github.ref_name }} $exe --clobber

      # ── Always upload artifacts (downloadable from Actions tab) ──────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/*-portable.exe

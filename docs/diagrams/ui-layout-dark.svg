<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 410" width="840" height="410">
  <defs>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}</style>
    <clipPath id="w"><rect width="840" height="410" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#w)">
    <!-- Window background -->
    <rect width="840" height="410" fill="#0d1117"/>

    <!-- Toolbar bar -->
    <rect width="840" height="38" fill="#21262d"/>

    <!-- Toolbar: layout toggle -->
    <rect x="16" y="8" width="132" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="49" y="23" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="500">Portrait</text>
    <rect x="82" y="8" width="66" height="22" rx="4" fill="rgba(61,220,132,0.12)"/>
    <text x="115" y="23" text-anchor="middle" fill="#3ddc84" font-size="10" font-weight="600">Landscape</text>

    <!-- Toolbar: theme toggle -->
    <rect x="782" y="8" width="44" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="795" y="23" text-anchor="middle" fill="#8b949e" font-size="13">☀</text>
    <text x="815" y="23" text-anchor="middle" fill="#3ddc84" font-size="13">☾</text>

    <!-- Header -->
    <text x="420" y="64" text-anchor="middle" fill="#f0f6fc" font-size="17" font-weight="700">Android Application Installer</text>
    <text x="420" y="82" text-anchor="middle" fill="#8b949e" font-size="12">Install APK &amp; AAB files — no SDK required</text>

    <!-- Separator -->
    <line x1="16" y1="94" x2="824" y2="94" stroke="#30363d" stroke-width="1"/>

    <!-- ════════════ Left Column ════════════ -->

    <!-- Package card -->
    <rect x="16" y="104" width="372" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="32" y="122" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="0.5">PACKAGE</text>
    <!-- Drop zone -->
    <rect x="28" y="130" width="348" height="54" rx="8" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="202" y="155" text-anchor="middle" fill="#6e7681" font-size="12">Click to select or drag APK / AAB</text>
    <text x="202" y="172" text-anchor="middle" fill="#6e7681" font-size="10">.apk · .aab</text>

    <!-- Device card -->
    <rect x="16" y="204" width="372" height="112" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="32" y="222" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="0.5">DEVICE</text>
    <!-- Device badge -->
    <rect x="72" y="210" width="60" height="18" rx="9" fill="rgba(61,220,132,0.12)"/>
    <text x="102" y="223" text-anchor="middle" fill="#3ddc84" font-size="10" font-weight="500">Pixel 8</text>
    <!-- Action buttons row 1 -->
    <rect x="28" y="236" width="62" height="26" rx="6" fill="rgba(61,220,132,0.12)" stroke="rgba(61,220,132,0.3)" stroke-width="1"/>
    <text x="59" y="253" text-anchor="middle" fill="#3ddc84" font-size="11" font-weight="500">Install</text>
    <rect x="96" y="236" width="96" height="26" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="144" y="253" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="500">Install &amp; Run</text>
    <!-- Action buttons row 2 -->
    <rect x="28" y="270" width="62" height="26" rx="6" fill="rgba(88,166,255,0.12)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
    <text x="59" y="287" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="500">Launch</text>
    <rect x="96" y="270" width="74" height="26" rx="6" fill="rgba(248,81,73,0.12)" stroke="rgba(248,81,73,0.3)" stroke-width="1"/>
    <text x="133" y="287" text-anchor="middle" fill="#f85149" font-size="11" font-weight="500">Uninstall</text>

    <!-- AAB Settings card (collapsed) -->
    <rect x="16" y="324" width="372" height="32" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="42" y="344" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="0.5">▸ AAB SETTINGS</text>

    <!-- ════════════ Divider ════════════ -->
    <rect x="416" y="190" width="4" height="48" rx="2" fill="#6e7681" fill-opacity="0.4"/>
    <text x="418" y="260" text-anchor="middle" fill="#6e7681" font-size="9">◂ ▸</text>

    <!-- ════════════ Right Column ════════════ -->

    <!-- Tools card -->
    <rect x="452" y="104" width="372" height="100" rx="10" fill="#161b22" stroke="rgba(61,220,132,0.25)" stroke-width="1"/>
    <text x="468" y="122" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="0.5">REQUIRED TOOLS</text>
    <!-- Tool rows -->
    <text x="468" y="144" fill="#c9d1d9" font-size="12" font-weight="500">ADB</text>
    <circle cx="540" cy="140" r="4" fill="#3ddc84"/><text x="552" y="144" fill="#3ddc84" font-size="10">Installed</text>
    <line x1="468" y1="153" x2="808" y2="153" stroke="#30363d" stroke-width="0.5"/>
    <text x="468" y="168" fill="#c9d1d9" font-size="12" font-weight="500">bundletool</text>
    <circle cx="540" cy="164" r="4" fill="#3ddc84"/><text x="552" y="168" fill="#3ddc84" font-size="10">Installed</text>
    <line x1="468" y1="177" x2="808" y2="177" stroke="#30363d" stroke-width="0.5"/>
    <text x="468" y="192" fill="#c9d1d9" font-size="12" font-weight="500">Java JRE</text>
    <circle cx="540" cy="188" r="4" fill="#3ddc84"/><text x="552" y="192" fill="#3ddc84" font-size="10">Installed</text>

    <!-- Log card -->
    <rect x="452" y="212" width="372" height="184" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="468" y="230" fill="#8b949e" font-size="10" font-weight="600" letter-spacing="0.5">ACTIVITY LOG</text>
    <!-- Log panel inner -->
    <rect x="462" y="238" width="352" height="148" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
    <!-- Mock log entries -->
    <text x="474" y="258" fill="#6e7681" font-size="11" font-family="SF Mono,Consolas,monospace">12:00:01</text>
    <text x="542" y="258" fill="#3ddc84" font-size="11">✓</text>
    <text x="556" y="258" fill="#c9d1d9" font-size="11" font-family="SF Mono,Consolas,monospace">ADB found at /usr/bin/adb</text>

    <text x="474" y="278" fill="#6e7681" font-size="11" font-family="SF Mono,Consolas,monospace">12:00:02</text>
    <text x="542" y="278" fill="#58a6ff" font-size="11">ℹ</text>
    <text x="556" y="278" fill="#8b949e" font-size="11" font-family="SF Mono,Consolas,monospace">1 device connected</text>

    <text x="474" y="298" fill="#6e7681" font-size="11" font-family="SF Mono,Consolas,monospace">12:00:03</text>
    <text x="542" y="298" fill="#3ddc84" font-size="11">✓</text>
    <text x="556" y="298" fill="#c9d1d9" font-size="11" font-family="SF Mono,Consolas,monospace">bundletool ready</text>

    <text x="474" y="318" fill="#6e7681" font-size="11" font-family="SF Mono,Consolas,monospace">12:00:05</text>
    <text x="542" y="318" fill="#3ddc84" font-size="11">✓</text>
    <text x="556" y="318" fill="#3ddc84" font-size="11" font-family="SF Mono,Consolas,monospace">Installed successfully!</text>

    <!-- Drag hint under log -->
    <text x="638" y="406" text-anchor="middle" fill="#6e7681" font-size="9">◂ drag ▸</text>
  </g>

  <!-- Window border (drawn on top) -->
  <rect width="840" height="410" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>

